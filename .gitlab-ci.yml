include:
  - project: 'sellsuki/sre/deployment/pipeline-deployment'
    ref: 'main'
    file: 'pipelines/gitlab-ci-pipeline.generic-frontend-npm.yml'


variables:
  # Unit tests — run Vitest
  UNIT_TEST_IMAGE_NAME: 'registry.fountain.sellsuki.com/dockerhub/library/node:20'
  UNIT_TEST_BEFORE_SCRIPT: 'sh -c "rm -rf ~/.cache/esbuild && npm ci"'
  UNIT_TEST_SCRIPT: 'npm run test:run'

  # Integration tests — skip for now
  INTEGRATION_TEST_IMAGE_NAME: 'registry.fountain.sellsuki.com/dockerhub/library/alpine:3.15'
  INTEGRATION_TEST_BEFORE_SCRIPT: 'echo "skip"'
  INTEGRATION_TEST_SCRIPT: 'echo "skip"'

  # E2E tests — skip for now (requires running backend)
  E2E_TEST_IMAGE_NAME: 'registry.fountain.sellsuki.com/dockerhub/library/alpine:3.15'
  E2E_TEST_BEFORE_SCRIPT: 'echo "skip"'
  E2E_TEST_SCRIPT: 'echo "skip"'

#### Stagings ####
.variables_export_staging_frontend:
  variables:
    CI_JOB_ENABLE: 'true'
    DOCKER_IMAGE: 'registry.fountain.sellsuki.com/dockerhub/library/node:20'
    APP_ENV: 'staging'
    BUILD_OUTPUT: './dist'
    STORYBOOK_ENABLE: 'false'

    VITE_API_URL: 'https://bola-api.staging-th.bearyweb.com/'
    APP_URL: 'bola-web.staging-th.bearyweb.com'
    CLOUDFRONT_DISTRIBUTION_ID: 'E3J776N4WE9KH0'
    AWS_CERTIFICATE_ID: '702bb7c8-85c9-4fe0-83f9-31c204527ddc'
    AWS_REGION: "ap-southeast-7"
    FRONTEND_DEPLOYMENT_IMAGE: registry.fountain.sellsuki.com/service/frontend-deployment:1.2.0
