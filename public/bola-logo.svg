<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App icon background -->
  <rect width="100" height="100" rx="20" fill="#06C755"/>

  <!-- ===== SUIT ===== -->
  <!-- Jacket body -->
  <ellipse cx="50" cy="95" rx="42" ry="32" fill="#1e293b"/>
  <!-- White shirt front -->
  <ellipse cx="50" cy="92" rx="22" ry="24" fill="#f1f5f9"/>
  <!-- Red tie -->
  <polygon points="47,68 53,68 56,83 50,91 44,83" fill="#dc2626"/>
  <polygon points="47,68 53,68 50,73" fill="#991b1b"/>

  <!-- ===== FROG HEAD ===== -->
  <!-- Main head -->
  <circle cx="50" cy="50" r="33" fill="#4ade80"/>

  <!-- Eye stalks / bumps -->
  <ellipse cx="29" cy="27" rx="13" ry="12" fill="#4ade80"/>
  <ellipse cx="71" cy="27" rx="13" ry="12" fill="#4ade80"/>

  <!-- Eyeball whites -->
  <circle cx="29" cy="27" r="10" fill="white"/>
  <circle cx="71" cy="27" r="10" fill="white"/>

  <!-- Pupils -->
  <circle cx="30" cy="28" r="6.5" fill="#0f172a"/>
  <circle cx="72" cy="28" r="6.5" fill="#0f172a"/>

  <!-- Eye shine -->
  <circle cx="32" cy="25.5" r="2.2" fill="white"/>
  <circle cx="74" cy="25.5" r="2.2" fill="white"/>

  <!-- ===== GLASSES ===== -->
  <!-- Left lens -->
  <rect x="16" y="20" width="26" height="16" rx="5" fill="none" stroke="#0f172a" stroke-width="2.8"/>
  <!-- Right lens -->
  <rect x="58" y="20" width="26" height="16" rx="5" fill="none" stroke="#0f172a" stroke-width="2.8"/>
  <!-- Bridge -->
  <line x1="42" y1="28" x2="58" y2="28" stroke="#0f172a" stroke-width="2.5"/>
  <!-- Side arms -->
  <line x1="16" y1="28" x2="8" y2="26" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="28" x2="92" y2="26" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== FACE DETAILS ===== -->
  <!-- Nostrils -->
  <circle cx="45.5" cy="57" r="2.2" fill="#16a34a"/>
  <circle cx="54.5" cy="57" r="2.2" fill="#16a34a"/>

  <!-- Wide goofy smile -->
  <path d="M 27,65 Q 36,77 50,78 Q 64,77 73,65" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <!-- Upturned smile corners (cheeky!) -->
  <path d="M 27,65 Q 23,61 26,57" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 73,65 Q 77,61 74,57" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== SUIT COLLAR / LAPELS ===== -->
  <path d="M 24,68 L 37,79 L 50,71 L 63,79 L 76,68 L 66,62 L 50,68 L 34,62 Z" fill="#1e293b"/>
  <!-- White shirt V-neck -->
  <path d="M 38,68 L 50,62 L 62,68 L 50,80 Z" fill="#f1f5f9"/>
</svg>
